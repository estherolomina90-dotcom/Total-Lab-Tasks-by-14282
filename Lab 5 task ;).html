<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form stuff</title>
</head>
<body>

<form>
    <fieldset>
        <legend>Registration Form</legend>

        <div>
            <label for="fullname">Full name</label>
            <input type="text" name="fullname" id="fullname">
        </div>
        <br>

        <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email">
        </div>
        <br>

        <div>
            <label for="age">Age</label>
            <input type="number" name="age" id="age">
        </div>
        <br>

        <div>
            <p>Gender</p>
            <label for="male">Male</label>
            <input type="radio" name="gender" value="Male" id="male">

            <label for="female">Female</label>
            <input type="radio" name="gender" value="Female" id="female">
        </div>

        <div>
            <br>
            <label for="document">Document</label>
            <input type="file" name="document" id="document">
        </div>

        <div>
            <br>
            <label for="faculty">Faculty</label><br>
            <select name="faculty" id="faculty">
                <option value="science">Natural And Applied Sciences</option>
                <option value="arts">Arts</option>
                <option value="management">Management Sciences</option>
            </select>
        </div>

        <div>
            <br>
            <label for="message">Additional Information</label><br>
            <textarea id="message" name="message" placeholder="Additional information"></textarea>
        </div>

        <div>
            <br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>

    </fieldset>
</form>

</body>
</html>
